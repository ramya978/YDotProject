<div class="min-vh-100 d-flex align-items-center justify-content-center py-10 px-5 auth-bg">

        <div class="decoration-section m-5 bg-dark-subtle rounded-3 me-0 mb-0 mb-lg-5"></div>
        <div class="login-section bg-white rounded-4 p-6 px-xl-12">
            <a href="index" class="d-flex justify-content-end align-items-center gap-2 logo-main mt-2 mb-5 mb-md-0">
                <img height="33" width="33" class="logo-dark" alt="Dark Logo" src="assets/images/logo-md.png">
                <h3 class="mb-0 lh-base fw-semibold">Mirbal</h3>
            </a>
            <div class="d-flex flex-column justify-content-center h-100 ">
                <div class="mb-12">
                    <h5 class="mb-2">Check your inbox</h5>
                    <p class="text-muted mb-0">Enter the 4-digit code we sent to your email.</p>
                </div>
                <form>
                    <div id="otp-container" class="d-flex align-items-center justify-content-center gap-2 mb-10">
                        <input type="text" class="form-control text-center w-100 border rounded" placeholder="0" data-otp-input maxlength="1" inputmode="numeric" pattern="[0-9]" aria-label="OTP digit 1">
                        <input type="text" class="form-control text-center w-100 border rounded" placeholder="0" data-otp-input maxlength="1" inputmode="numeric" pattern="[0-9]" aria-label="OTP digit 2">
                        <input type="text" class="form-control text-center w-100 border rounded" placeholder="0" data-otp-input maxlength="1" inputmode="numeric" pattern="[0-9]" aria-label="OTP digit 3">
                        <input type="text" class="form-control text-center w-100 border rounded" placeholder="0" data-otp-input maxlength="1" inputmode="numeric" pattern="[0-9]" aria-label="OTP digit 4">
                    </div>
                    <div class="text-center mb-5">
                        <a href="reset-password" class="btn btn-primary w-100">Verify Email</a>
                    </div>
                </form>
                <p class="text-center text-muted fs-14 my-6">Didn't receive the code? <a href="#!" class="link link-primary">Resend</a></p>

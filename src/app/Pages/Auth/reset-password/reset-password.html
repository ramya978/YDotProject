<div class="min-vh-100 d-flex align-items-center justify-content-center py-10 px-5 auth-bg">
  <div class="main-wrapper border bg-white rounded-4 d-flex flex-column flex-lg-row gap-xl-5 position-relative overflow-hidden w-100 shadow">
    <div class="decoration-section m-5 bg-dark-subtle rounded-3 me-0 mb-0 mb-lg-5"></div>
    <div class="login-section bg-white rounded-4 p-6 px-xl-12">
      <a href="index" class="d-flex justify-content-end align-items-center gap-2 logo-main mt-lg-2 mb-5 mb-md-0">
        <img height="33" width="33" class="logo-dark" alt="Dark Logo" src="assets/images/logo-md.png">
        <h3 class="mb-0 lh-base fw-semibold">Mirbal</h3>
      </a>
      <div class="d-flex flex-column justify-content-center h-100 ">
        <div class="mb-12">
          <h5 class="mb-2">Back in Control</h5>
          <p class="text-muted mb-0">Log in with the new password once it's set.</p>
        </div>
        <form>
          <div class="mb-4">
            <div class="position-relative">
              <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
              <button type="button" class="btn btn-link position-absolute end-0 top-0 text-decoration-none text-muted toggle-password" id="toggle-password" data-target="password"><i class="ri-eye-off-line align-middle"></i></button>
            </div>
          </div>
          <div class="mb-10">
            <div class="position-relative">
              <input type="password" class="form-control" id="confirmPassword" placeholder="Re-enter your password" required>
              <button type="button" class="btn btn-link position-absolute end-0 top-0 text-decoration-none text-muted toggle-password" data-target="confirmPassword">
                <i class="ri-eye-off-line align-middle"></i>
              </button>
            </div>
          </div>
          <div class="text-center mb-5">
            <a  class="btn btn-primary w-100">Set Password</a>
          </div>
        </form>
        <p class="text-center text-muted fs-14 my-6">Back to <a href="login" class="link link-primary">Sign In?</a></p>
      </div>
    </div>
  </div>
</div>

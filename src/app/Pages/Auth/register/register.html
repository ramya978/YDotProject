<div class="min-vh-100 d-flex align-items-center justify-content-center px-5 py-10 auth-bg">
    <div class="main-wrapper border bg-white rounded-4 d-flex flex-column flex-lg-row gap-xl-5 position-relative overflow-hidden w-100 shadow">
        <div class="decoration-section m-5 bg-dark-subtle rounded-3 me-0 mb-0 mb-lg-5"></div>
        <div class="login-section bg-white rounded-4 p-6 px-xl-12">
            <a href="index" class="d-flex justify-content-end align-items-center gap-2 logo-main mt-lg-2 mb-10">
                <img height="33" width="33" class="logo-dark" alt="Dark Logo" src="assets/images/logo-md.png">
                <h3 class="mb-0 lh-base fw-semibold">Mirbal</h3>
            </a>
            <div class="mb-8">
                <h5 class="mb-2">Join Mirbal Now</h5>
                <p class="text-muted mb-0">
                    It only takes a moment to create your account
                </p>
            </div>
            <form>
                <div class="mb-4">
                    <input type="text" class="form-control" id="username" placeholder="Username" required>
                </div>
                <div class="mb-4">
                    <input type="text" class="form-control" id="email" placeholder="Email" required>
                </div>
                <div class="mb-4">
                    <div class="position-relative">
                        <input type="password" class="form-control" id="password" placeholder="Password" required>
                        <button type="button" class="btn btn-link position-absolute end-0 top-0 text-decoration-none text-muted toggle-password" id="toggle-password" data-target="password"><i class="ri-eye-off-line align-middle"></i></button>
                    </div>
                </div>
                <div class="mb-4">
                    <div class="position-relative">
                        <input type="password" class="form-control" id="ConfirmPassword" placeholder="Confirm Password" required>
                        <button type="button" class="btn btn-link position-absolute end-0 top-0 text-decoration-none text-muted toggle-password" id="toggle-password" data-target="ConfirmPassword"><i class="ri-eye-off-line align-middle"></i></button>
                    </div>
                </div>
                <div class="mb-10">
                    <div class="d-flex justify-content-between align-items-center">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="rememberMe">
                            <label class="form-check-label" for="rememberMe">Remember me</label>
                        </div>
                    </div>
                </div>
                <div class="text-center mb-5">
                    <button type="button" class="btn btn-primary w-100">Create An Account</button>
                </div>
            </form>
            <p class="text-center text-muted fs-14 my-6">Already have an account? <a href="login" class="link link-primary">Sign In</a></p>
            <div class="d-flex flex-wrap flex-md-nowrap align-items-center justify-content-center gap-2">
                <button type="button" class="btn btn-outline-light text-black d-flex align-items-center gap-2">
                    <img src="assets/images/auth/google-icon.svg" alt="Google" class="w-16px">Sign in via Google
                </button>
                <button type="button" class="btn btn-outline-light text-black d-flex align-items-center gap-2">
                    <img src="assets/images/auth/apple-black.svg" alt="Google" class="w-16px">Sign in via Apple
                </button>
            </div>
        </div>
    </div>
</div>
